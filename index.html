<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masarak Education | Coming Soon</title>
    <meta name="description" content="Masarak Education — World-class mentors for Arab students. Stay tuned for our new website.">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="canonical" href="https://masarak.github.io/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated gradient background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 60%);
            animation: drift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 3%); }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 220px;
            margin-bottom: 2.5rem;
            filter: brightness(0) invert(1) drop-shadow(0 0 30px rgba(37, 99, 235, 0.15));
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        h1 span {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            font-weight: 300;
            line-height: 1.6;
        }

        .contact {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .contact a {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.85rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 280px;
            justify-content: center;
        }

        .contact a:hover {
            transform: translateY(-2px);
        }

        .contact .whatsapp {
            background: #25d366;
            color: #fff;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }

        .contact .whatsapp:hover {
            box-shadow: 0 6px 28px rgba(37, 211, 102, 0.45);
        }

        .contact .email {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .contact .email:hover {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.2);
        }

        .contact a i {
            font-size: 1.2rem;
        }

        @media (max-width: 480px) {
            .logo {
                width: 160px;
                margin-bottom: 2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .tagline {
                font-size: 1rem;
                margin-bottom: 2rem;
            }

            .contact a {
                width: 260px;
                font-size: 0.95rem;
                padding: 0.75rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/logo.png" alt="Masarak Education Logo" class="logo">
        <h1>Something <span>exciting</span> is coming</h1>
        <p class="tagline">We're building something new. Stay tuned!</p>
        <div class="contact">
            <a href="https://wa.me/447440117343?text=Hi%20Masarak!%20I'm%20interested%20in%20learning%20more%20about%20the%20program." class="whatsapp" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </a>
            <a href="mailto:contact@masarak.education" class="email">
                <i class="fas fa-envelope"></i> contact@masarak.education
            </a>
        </div>
    </div>
</body>
</html>
